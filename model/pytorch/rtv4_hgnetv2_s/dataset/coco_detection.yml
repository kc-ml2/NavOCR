task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

num_classes: 1
remap_mscoco_category: True

train_dataloader: 
  type: DataLoader
  dataset: 
    type: CocoDetection
    img_folder: /mnt/sda/chlee/coco_dataset_navocr/images/train/
    ann_file: /mnt/sda/chlee/coco_dataset_navocr/annotations/instances_train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True 
  collate_fn:
    type: BatchImageCollateFunction


val_dataloader:
  type: DataLoader
  dataset: 
    type: CocoDetection
    img_folder: /mnt/sda/chlee/coco_dataset_navocr/images/val/
    ann_file: /mnt/sda/chlee/coco_dataset_navocr/annotations/instances_val.json
    # img_folder: /mnt/sda/chlee/coco_dataset_navocr/images/test/
    # ann_file: /mnt/sda/chlee/coco_dataset_navocr/annotations/instances_test.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~ 
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction