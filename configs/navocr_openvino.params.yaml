/**:
  ros__parameters:
    params_file: configs/navocr_openvino.params.yaml

    detector_backend: openvino
    detector_model_path: model/rtv4_hgnetv2_s.xml
    detector_threshold: 0.5
    detector_device: "CPU"
    detector_imgsz: 640

    ocr_backend: openvino
    ocr_model_path: model/PP-OCRv5_mobile_rec_infer.xml
    ocr_dict_path: model/PP-OCRv5_mobile_rec_infer/inference.yml
    ocr_threshold: 0.6
    ocr_device: "CPU"
    ocr_max_resize: 800
    ocr_rec_h: 48
    ocr_rec_img_w: 320
    ocr_rec_max_w: 3200

    output_dir: results/ros_result_ocr
    ocr_language: en
    save_image: false
    benchmark: false
    image_save_interval: 10
    image_topic: /camera/infra1/image_rect_raw
    detections_topic: /navocr/detections
    annotated_image_topic: /navocr/annotated_image
